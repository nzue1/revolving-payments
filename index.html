<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リボポイ活ガイド</title>

<style>
:root {
  --main: #4f46e5;
  --bg: #f9fafb;
  --text: #1f2937;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ヘッダー */
header {
  background: white;
  padding: 15px 20px;
  position: sticky;
  top: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

header h1 {
  margin: 0;
  font-size: 16px;
}

/* ヒーロー */
.hero {
  padding: 50px 15px;
  text-align: center;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
}

.hero h2 {
  font-size: 22px;
}

/* コンテナ */
.container {
  padding: 15px;
  max-width: 900px;
  margin: auto;
}

/* カード */
.card {
  background: white;
  padding: 18px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

/* 見出し */
h2 {
  margin-top: 0;
  border-left: 4px solid var(--main);
  padding-left: 8px;
  font-size: 18px;
}

/* =====================
   図解（単体アニメ）
===================== */

.infographic {
  margin-top: 15px;
  opacity: 0;
  transform: translateY(40px) scale(0.97);
  transition: all 0.8s ease;
}

.infographic.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.infographic img {
  width: 100%;
  height: auto;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* クリック拡大ヒント */
.caption {
  font-size: 12px;
  color: #666;
  margin-top: 8px;
}

/* スマホ調整 */
@media (max-width: 480px) {
  .infographic img {
    border-radius: 8px;
  }
}

/* タブレット以上 */
@media (min-width: 768px) {
  header h1 { font-size: 20px; }
  .hero h2 { font-size: 30px; }
  .card { padding: 25px; }
}

</style>
</head>

<body>

<header>
  <h1>リボポイ活ガイド</h1>
</header>

<section class="hero">
  <h2>図解でわかるリボポイ活</h2>
  <p>全体像を一発で理解</p>
</section>

<div class="container">

  <div class="card">
    <h2>図解（全体像）</h2>

    <div class="infographic" id="infographic">
      <a href="images/infographic.png" target="_blank">
        <img src="images/infographic.png" alt="リボポイ活の図解">
      </a>
    </div>

    <p class="caption">
      ※タップすると拡大できます
    </p>

    <p style="margin-top:15px;">
      上の図の通り、「リボ設定 → すぐ返済」がポイントです。
      ここを間違えると手数料が発生します。
    </p>

  </div>

</div>

<script>
const target = document.getElementById('infographic');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      target.classList.add('show');
    }
  });
}, {
  threshold: 0.3
});

observer.observe(target);
</script>

</body>
</html>
